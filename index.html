<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04090f">
<title>Liga MX — Apertura 2026</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/app-180.png">
<link rel="icon" type="image/png" href="icons/app-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#04090f;--panel:rgba(14,32,27,.55);--panel2:rgba(9,22,18,.65);
    --line:rgba(56,225,255,.13);--line2:rgba(45,255,164,.16);
    --text:#eafff5;--muted:#7fa899;--muted2:#5d8577;
    --neon:#2dffa4;--cyan:#38e1ff;--gold:#ffd166;--red:#ff5d5d;--blue:#5aa9ff;
    --glowN:0 0 18px rgba(45,255,164,.35);--glowC:0 0 18px rgba(56,225,255,.30);
    --shadow:0 14px 40px rgba(0,0,0,.45);
    --disp:'Rajdhani',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);color:var(--text);
    font-family:'Inter',system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;padding-bottom:env(safe-area-inset-bottom);position:relative}
  body::before{content:'';position:fixed;inset:0;z-index:-2;
    background:
      radial-gradient(820px 480px at 88% -10%, rgba(56,225,255,.13), transparent 60%),
      radial-gradient(700px 520px at -12% 22%, rgba(45,255,164,.10), transparent 55%),
      radial-gradient(600px 400px at 50% 115%, rgba(255,209,102,.05), transparent 60%),
      linear-gradient(180deg,#071510,#04090f 55%)}
  body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
    background-image:linear-gradient(rgba(120,220,190,.028) 1px,transparent 1px),
      linear-gradient(90deg,rgba(120,220,190,.028) 1px,transparent 1px);
    background-size:44px 44px;
    -webkit-mask-image:radial-gradient(80% 60% at 50% 0%,#000 30%,transparent 100%);
    mask-image:radial-gradient(80% 60% at 50% 0%,#000 30%,transparent 100%)}
  header{position:sticky;top:0;z-index:20;background:rgba(4,9,15,.72);backdrop-filter:blur(18px) saturate(1.3);
    border-bottom:1px solid var(--line);padding:calc(10px + env(safe-area-inset-top)) 14px 0}
  .top{display:flex;align-items:center;gap:12px;max-width:820px;margin:0 auto}
  .top img{width:44px;height:44px;object-fit:contain;border-radius:12px;
    box-shadow:0 0 0 1px rgba(45,255,164,.25), 0 0 22px rgba(45,255,164,.25)}
  .title h1{font-family:var(--disp);font-size:1.32rem;margin:0;letter-spacing:1.5px;font-weight:700;
    text-transform:uppercase;line-height:1;
    background:linear-gradient(90deg,#fff, #9dffd9 45%, var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent}
  .title p{margin:3px 0 0;font-size:.64rem;color:var(--muted);letter-spacing:2.5px;text-transform:uppercase}
  .refresh{margin-left:auto;display:flex;align-items:center;gap:8px}
  .updated{font-size:.6rem;color:var(--muted);text-align:right;line-height:1.35;letter-spacing:.4px}
  .live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:var(--neon);margin-right:4px;
    box-shadow:0 0 10px var(--neon);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  .live-dot.off{background:var(--muted2);box-shadow:none;animation:none}
  button.icon{background:rgba(56,225,255,.06);border:1px solid var(--line);color:var(--cyan);width:37px;height:37px;
    border-radius:11px;font-size:1.05rem;cursor:pointer;display:grid;place-items:center;transition:.15s}
  button.icon:active{transform:scale(.88)}
  .spin{animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
  nav{display:flex;gap:7px;padding:11px 2px 13px;max-width:820px;margin:0 auto;overflow-x:auto;scrollbar-width:none}
  nav::-webkit-scrollbar{display:none}
  nav button{flex:0 0 auto;padding:8px 15px;border:1px solid rgba(255,255,255,.09);border-radius:999px;cursor:pointer;
    background:rgba(255,255,255,.03);color:var(--muted);font-weight:700;font-size:.72rem;white-space:nowrap;
    font-family:var(--disp);letter-spacing:1.6px;text-transform:uppercase;transition:.2s}
  nav button.active{background:linear-gradient(135deg,var(--neon),var(--cyan));color:#03140c;border-color:transparent;
    box-shadow:0 0 20px rgba(45,255,164,.4), 0 4px 14px rgba(0,0,0,.4);text-shadow:none}
  main{max-width:820px;margin:0 auto;padding:16px 12px 46px}
  section{animation:fade .28s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;
    overflow:hidden;box-shadow:var(--shadow);backdrop-filter:blur(12px);position:relative}
  .card::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(45,255,164,.5),rgba(56,225,255,.5),transparent)}
  table{width:100%;border-collapse:collapse;font-size:.82rem}
  thead th{background:rgba(0,0,0,.25);color:var(--muted);font-weight:700;font-size:.6rem;text-transform:uppercase;
    letter-spacing:1.4px;padding:11px 4px;text-align:center;font-family:var(--disp)}
  thead th.tname{text-align:left;padding-left:12px}
  tbody td{padding:9px 4px;text-align:center;border-top:1px solid rgba(255,255,255,.045)}
  tbody tr:nth-child(even) td{background:rgba(255,255,255,.018)}
  tbody td.tname{text-align:left;padding-left:6px}
  .teamcell{display:flex;align-items:center;gap:8px;min-width:0}
  .teamcell img{width:22px;height:22px;object-fit:contain;flex:0 0 22px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
  .teamcell span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
  .pos{font-weight:700;width:24px;color:var(--muted2);font-family:var(--disp)}
  .pts{font-weight:800;color:var(--neon);text-shadow:0 0 12px rgba(45,255,164,.45);font-variant-numeric:tabular-nums}
  .zone{width:4px;padding:0!important}
  .legend{display:flex;flex-wrap:wrap;gap:12px;padding:13px 6px 2px;font-size:.66rem;color:var(--muted)}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .round-h{margin:20px 4px 9px;font-size:.72rem;font-weight:700;color:var(--cyan);text-transform:uppercase;
    letter-spacing:2.2px;font-family:var(--disp);display:flex;align-items:center;gap:10px}
  .round-h::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(56,225,255,.35),transparent)}
  .match{display:flex;align-items:center;padding:12px;border-top:1px solid rgba(255,255,255,.045);gap:8px}
  .match:first-child{border-top:none}
  .side{display:flex;align-items:center;gap:8px;flex:1;min-width:0}
  .side.home{justify-content:flex-end;text-align:right}
  .side img{width:24px;height:24px;object-fit:contain;flex:0 0 24px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.5))}
  .side span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;font-size:.84rem}
  .score{background:rgba(0,0,0,.4);border:1px solid var(--line2);border-radius:11px;padding:6px 12px;font-weight:800;
    min-width:60px;text-align:center;font-variant-numeric:tabular-nums;font-family:var(--disp);font-size:1rem;
    letter-spacing:1px;box-shadow:inset 0 0 12px rgba(45,255,164,.06)}
  .score.pend{color:var(--muted);font-weight:600;font-size:.66rem;border-style:dashed;border-color:rgba(255,255,255,.14);
    box-shadow:none;font-family:'Inter',sans-serif;letter-spacing:0}
  .mdate{font-size:.62rem;color:var(--muted2);text-align:center;margin-top:3px}
  .msg{padding:36px 20px;text-align:center;color:var(--muted);font-size:.9rem}
  /* Liguilla */
  .brk{display:flex;flex-direction:column;gap:12px}
  .brk .phase{font-size:.68rem;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:2px;
    margin:10px 2px 0;font-family:var(--disp);display:flex;align-items:center;gap:10px}
  .brk .phase::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,209,102,.3),transparent)}
  .tie{display:flex;align-items:center;gap:8px;background:linear-gradient(180deg,var(--panel),var(--panel2));
    border:1px solid var(--line);border-radius:14px;padding:11px 12px;margin-top:7px;box-shadow:var(--shadow);backdrop-filter:blur(12px)}
  .tie .seed{font-size:.62rem;color:var(--gold);width:28px;text-align:center;font-weight:700;font-family:var(--disp);letter-spacing:1px}
  .tie .t{display:flex;align-items:center;gap:7px;flex:1;min-width:0}
  .tie .t img{width:20px;height:20px;object-fit:contain}
  .tie .t span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600;font-size:.82rem}
  .tie .vs{font-size:.6rem;color:var(--muted2);font-weight:700;font-family:var(--disp);letter-spacing:1px}
  .note{font-size:.68rem;color:var(--muted);padding:11px 4px;line-height:1.6}
  /* Estadísticas */
  .sgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px}
  .scard{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;
    padding:15px;box-shadow:var(--shadow);backdrop-filter:blur(12px);position:relative;overflow:hidden}
  .scard::before{content:'';position:absolute;top:0;left:10%;right:10%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(45,255,164,.45),transparent)}
  .scard .k{font-size:.58rem;text-transform:uppercase;letter-spacing:1.6px;color:var(--muted);font-weight:700;font-family:var(--disp)}
  .scard .v{font-family:var(--disp);font-size:1.9rem;font-weight:700;margin-top:3px;line-height:1;
    background:linear-gradient(135deg,var(--neon),var(--cyan));-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 10px rgba(45,255,164,.3))}
  .scard.hl .v{background:linear-gradient(135deg,var(--gold),#ffeaa8);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 10px rgba(255,209,102,.35))}
  .scard .s{font-size:.64rem;color:var(--muted);margin-top:4px}
  .scard .teamcell{margin-top:8px}
  .scard .teamcell img{width:27px;height:27px}
  .scard .teamcell span{font-size:.92rem}
  /* Quiniela */
  .qcard{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:18px;
    padding:15px;box-shadow:var(--shadow);margin-bottom:14px;backdrop-filter:blur(12px);position:relative;overflow:hidden}
  .qcard::before{content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
    background:linear-gradient(90deg,transparent,rgba(45,255,164,.5),rgba(56,225,255,.5),transparent)}
  .qhead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px}
  .qhead .h{font-family:var(--disp);font-size:1.02rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase}
  .qname{display:flex;gap:8px;align-items:center;margin:9px 0 4px;flex-wrap:wrap}
  .qname input{flex:1;min-width:150px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:12px;
    color:var(--text);padding:11px 13px;font-size:.9rem;font-weight:600;outline:none;transition:.2s;font-family:inherit}
  .qname input:focus{border-color:var(--neon);box-shadow:var(--glowN)}
  select.jsel{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:var(--cyan);
    padding:9px 11px;font-size:.78rem;font-weight:700;outline:none;font-family:var(--disp);letter-spacing:1px;text-transform:uppercase}
  .qmatch{display:flex;align-items:center;gap:6px;padding:11px 2px;border-top:1px solid rgba(255,255,255,.045)}
  .qmatch:first-of-type{border-top:none}
  .qmatch .side span{font-size:.78rem}
  .qbox{display:flex;align-items:center;gap:4px}
  .qbox input{width:43px;height:42px;text-align:center;font-size:1.05rem;font-weight:700;color:var(--text);
    background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.12);border-radius:11px;outline:none;
    -moz-appearance:textfield;font-family:var(--disp);transition:.2s}
  .qbox input::-webkit-outer-spin-button,.qbox input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  .qbox input:focus{border-color:var(--neon);box-shadow:var(--glowN)}
  .qbox input:disabled{opacity:.5}
  .qbox .sep{color:var(--muted2);font-weight:800}
  .qres{font-size:.6rem;text-align:center;margin-top:3px;color:var(--muted2)}
  .chip{display:inline-block;border-radius:999px;padding:2px 8px;font-size:.58rem;font-weight:800;letter-spacing:.3px}
  .chip.e{background:rgba(255,209,102,.16);color:var(--gold);box-shadow:inset 0 0 0 1px rgba(255,209,102,.35)}
  .chip.a{background:rgba(45,255,164,.13);color:var(--neon);box-shadow:inset 0 0 0 1px rgba(45,255,164,.3)}
  .chip.f{background:rgba(255,93,93,.12);color:var(--red);box-shadow:inset 0 0 0 1px rgba(255,93,93,.3)}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:13px}
  .btn{border:none;border-radius:12px;padding:12px 17px;font-weight:800;font-size:.8rem;cursor:pointer;transition:.15s;font-family:inherit}
  .btn:active{transform:scale(.95)}
  .btn.primary{background:linear-gradient(135deg,var(--neon),var(--cyan));color:#03140c;
    box-shadow:0 0 22px rgba(45,255,164,.35), 0 4px 14px rgba(0,0,0,.4)}
  .btn.wa{background:#17a45c;color:#fff;box-shadow:0 4px 14px rgba(23,164,92,.35)}
  .btn.ghost{background:rgba(56,225,255,.06);border:1px solid var(--line);color:var(--cyan)}
  textarea.qimp{width:100%;min-height:64px;background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.1);border-radius:12px;
    color:var(--text);padding:11px 13px;font-size:.74rem;outline:none;resize:vertical;font-family:inherit;transition:.2s}
  textarea.qimp:focus{border-color:var(--cyan);box-shadow:var(--glowC)}
  .qsum{display:flex;gap:9px;flex-wrap:wrap;margin-top:11px}
  .qpill{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.09);border-radius:13px;padding:8px 14px;
    font-size:.66rem;color:var(--muted);letter-spacing:.4px}
  .qpill b{color:var(--text);font-size:1.15rem;display:block;font-family:var(--disp);line-height:1.1}
  .qpill b.gold-h{color:var(--gold)}
  .pdel{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:.9rem;padding:2px 6px}
  .qhint{font-size:.66rem;color:var(--muted);line-height:1.6;margin-top:9px}
  .install{display:none;margin:18px auto 0;background:linear-gradient(135deg,var(--neon),var(--cyan));color:#03140c;
    border:none;padding:13px 22px;border-radius:13px;font-weight:800;cursor:pointer;
    box-shadow:0 0 24px rgba(45,255,164,.4);font-family:inherit;font-size:.88rem}
  .install.show{display:block}
  .foot{text-align:center;color:var(--muted2);font-size:.62rem;margin-top:28px;line-height:1.65}
  .foot a{color:var(--neon);text-decoration:none}
</style>
</head>
<body>
<header>
  <div class="top">
    <img alt="" src="icons/app-192.png">
    <div class="title"><h1>Liga MX</h1><p>Apertura 2026 · 18 equipos · Liguilla</p></div>
    <div class="refresh">
      <div class="updated" id="updated"><span class="live-dot off"></span>cargando…</div>
      <button class="icon" id="btnRefresh" title="Actualizar">⟳</button>
    </div>
  </div>
  <nav>
    <button data-tab="tabla" class="active">Tabla</button>
    <button data-tab="quiniela">🎯 Quiniela</button>
    <button data-tab="resultados">Resultados</button>
    <button data-tab="proximos">Próximos</button>
    <button data-tab="calendario">Calendario</button>
    <button data-tab="liguilla">Liguilla</button>
    <button data-tab="stats">Estadísticas</button>
  </nav>
</header>

<main>
  <section id="tabla"></section>
  <section id="quiniela" hidden></section>
  <section id="resultados" hidden></section>
  <section id="proximos" hidden></section>
  <section id="calendario" hidden></section>
  <section id="liguilla" hidden></section>
  <section id="stats" hidden></section>
  <button class="install" id="btnInstall">📲 Instalar app</button>
  <div class="foot">Base local confiable + actualización en vivo desde
    <a href="https://www.thesportsdb.com" target="_blank" rel="noopener">TheSportsDB</a>.<br>
    Tabla, Liguilla y Quiniela se calculan solas con cada resultado.</div>
</main>

<script src="app_data.js"></script>
<script>
const API='https://www.thesportsdb.com/api/v1/json', LEAGUE=4350, SEASON='2026-2027';
const REG=17;
const $=s=>document.querySelector(s), el=(t,c)=>{const e=document.createElement(t);if(c)e.className=c;return e;};
let DB=null, live=false;

function dt(p){ return new Date(`${p.fecha}T${p.hora}:00Z`); }
function fmt(d){ return d.toLocaleDateString('es-MX',{weekday:'short',day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'}); }
const isFT=p=>p.estado==='FT'&&p.golLocal!=null;
const eq=id=>DB.equipos[id]||{nombre:'?',badge:'icons/app-192.png'};

const LS_KEY='ligamx_ap2026_resultados';
function loadSaved(){ try{return JSON.parse(localStorage.getItem(LS_KEY)||'{}');}catch(e){return {};} }
function saveResult(n,gl,gv){
  try{const s=loadSaved(); s[n]=[gl,gv]; localStorage.setItem(LS_KEY,JSON.stringify(s));}catch(e){}
}
function applySaved(){
  const s=loadSaved();
  DB.partidos.forEach(p=>{ if(s[p.n]){ p.golLocal=s[p.n][0]; p.golVisitante=s[p.n][1]; p.estado='FT'; } });
}
function ymd(d){ return d.toISOString().slice(0,10); }

async function boot(){
  if(window.__DB__){ DB=JSON.parse(JSON.stringify(window.__DB__)); }
  else{ try{ DB=await (await fetch('data.json',{cache:'no-store'})).json(); }
    catch(e){ $('#tabla').innerHTML='<div class="msg">No pude cargar los datos.</div>'; return; } }
  applySaved();
  render(); stamp();
  liveUpdate();
}

async function liveUpdate(){
  $('#btnRefresh').classList.add('spin');
  const now=new Date();
  const urls=[
    `${API}/3/eventspastleague.php?id=${LEAGUE}`,
    `${API}/3/eventsseason.php?id=${LEAGUE}&s=${SEASON}`,
  ];
  for(let i=0;i<8;i++){ const d=new Date(now); d.setUTCDate(d.getUTCDate()-i);
    urls.push(`${API}/3/eventsday.php?d=${ymd(d)}&l=${LEAGUE}`); }
  let ok=false;
  const results=await Promise.allSettled(urls.map(u=>fetch(u,{cache:'no-store'}).then(r=>r.json())));
  results.forEach(res=>{
    if(res.status!=='fulfilled'||!res.value||!res.value.events) return;
    ok=true;
    res.value.events.forEach(ev=>{
      if(ev.intHomeScore==null||ev.intHomeScore===''||ev.strStatus!=='FT') return;
      const h=+ev.idHomeTeam,a=+ev.idAwayTeam,rd=+ev.intRound;
      const p=DB.partidos.find(x=>x.localId===h&&x.visitanteId===a&&x.jornada===rd);
      if(!p) return;
      const gl=+ev.intHomeScore,gv=+ev.intAwayScore;
      if(p.golLocal!==gl||p.golVisitante!==gv||p.estado!=='FT'){p.golLocal=gl;p.golVisitante=gv;p.estado='FT';}
      saveResult(p.n,gl,gv);
    });
  });
  live=ok; render(); stamp();
  $('#btnRefresh').classList.remove('spin');
}
function stamp(){
  const n=new Date();
  $('#updated').innerHTML=`<span class="live-dot ${live?'':'off'}"></span>${live?'En vivo':'Local'} · `+
    n.toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
}

/* ---- Tabla ---- */
function computeTable(){
  const T={};
  DB.partidos.filter(p=>isFT(p)&&p.jornada<=REG).forEach(p=>{
    const h=p.localId,a=p.visitanteId,gl=p.golLocal,gv=p.golVisitante;
    [h,a].forEach(t=>T[t]=T[t]||{id:t,PJ:0,G:0,E:0,P:0,GF:0,GC:0,Pts:0});
    T[h].PJ++;T[a].PJ++;T[h].GF+=gl;T[h].GC+=gv;T[a].GF+=gv;T[a].GC+=gl;
    if(gl>gv){T[h].G++;T[a].P++;T[h].Pts+=3;}else if(gl<gv){T[a].G++;T[h].P++;T[a].Pts+=3;}
    else{T[h].E++;T[a].E++;T[h].Pts++;T[a].Pts++;}
  });
  Object.keys(DB.equipos).forEach(id=>{id=+id;T[id]=T[id]||{id,PJ:0,G:0,E:0,P:0,GF:0,GC:0,Pts:0};});

}

}

/* ==================== QUINIELA ==================== */
const QK_ME='ligamx_qn_me', QK_GRP='ligamx_qn_grp', QVER='QLMX1';
let QJ=null;

function qLoadMe(){ try{const m=JSON.parse(localStorage.getItem(QK_ME)||'null'); if(m&&m.picks)return m;}catch(e){} return {name:'',picks:{}}; }
function qSaveMe(m){ try{localStorage.setItem(QK_ME,JSON.stringify(m));}catch(e){} }
function qLoadGrp(){ try{return JSON.parse(localStorage.getItem(QK_GRP)||'{}');}catch(e){return {};} }
function qSaveGrp(g){ try{localStorage.setItem(QK_GRP,JSON.stringify(g));}catch(e){} }

// 3 pts marcador exacto · 1 pt acertar ganador/empate
function qScore(picks){
  let pts=0,ex=0,ac=0,fa=0;
  DB.partidos.forEach(p=>{
    if(!isFT(p))return;
    const k=picks[p.n]; if(!k)return;
    const [gl,gv]=k;
    if(gl===p.golLocal&&gv===p.golVisitante){pts+=3;ex++;}
    else if(Math.sign(gl-gv)===Math.sign(p.golLocal-p.golVisitante)){pts+=1;ac++;}
    else fa++;
  });
  return {pts,ex,ac,fa};
}
function qEncode(m){
  const compact={}; Object.keys(m.picks).forEach(n=>{const v=m.picks[n]; if(v&&v[0]!=null&&v[1]!=null)compact[n]=v;});
  const json=JSON.stringify([m.name,compact]);
  return QVER+'.'+btoa(unescape(encodeURIComponent(json)));
}
function qDecode(code){
  try{
    if(!code.startsWith(QVER+'.'))return null;
    const [name,picks]=JSON.parse(decodeURIComponent(escape(atob(code.slice(QVER.length+1)))));
    if(typeof name!=='string'||typeof picks!=='object')return null;
    const clean={};
    Object.keys(picks).forEach(n=>{const v=picks[n];
      if(Array.isArray(v)&&v.length===2&&Number.isInteger(v[0])&&Number.isInteger(v[1])&&v[0]>=0&&v[1]>=0&&v[0]<100&&v[1]<100)clean[n]=v;});
    return {name:name.trim().slice(0,30)||'Sin nombre',picks:clean};
  }catch(e){return null;}
}
function qDefaultJornada(){
  const up=DB.partidos.filter(p=>!isFT(p)&&p.jornada<=REG).sort((a,b)=>dt(a)-dt(b));
  return up.length?up[0].jornada:REG;
}
function qToast(msg){
  const t=el('div');t.textContent=msg;
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#0b241a;border:1px solid rgba(45,255,164,.3);color:var(--text);padding:12px 19px;border-radius:13px;font-size:.8rem;font-weight:700;z-index:99;box-shadow:0 0 24px rgba(45,255,164,.2), 0 10px 30px rgba(0,0,0,.5)';
  document.body.appendChild(t); setTimeout(()=>t.remove(),2600);
}
function renderQuiniela(force){
  const w=$('#quiniela');
  if(!force && w.contains(document.activeElement) && document.activeElement.tagName!=='BODY') return;
  w.innerHTML='';
  const me=qLoadMe();
  if(QJ==null)QJ=qDefaultJornada();

  /* --- Mi quiniela --- */
  const c1=el('div','qcard');
  const head=el('div','qhead');
  head.innerHTML=`<div class="h">🎯 Mi quiniela</div>`;
  const jsel=el('select','jsel');
  for(let j=1;j<=REG;j++){const o=el('option');o.value=j;o.textContent='Jornada '+j;if(j===QJ)o.selected=true;jsel.appendChild(o);}
  jsel.onchange=()=>{QJ=+jsel.value;renderQuiniela(true);};
  head.appendChild(jsel);
  c1.appendChild(head);
  const nm=el('div','qname');
  nm.innerHTML=`<input id="qname" maxlength="30" placeholder="Tu nombre (aparece en el grupo)" value="${me.name.replace(/"/g,'&quot;')}">`;
  c1.appendChild(nm);
  const list=el('div');
  DB.partidos.filter(p=>p.jornada===QJ).sort((a,b)=>dt(a)-dt(b)).forEach(p=>{
    const H=eq(p.localId),A=eq(p.visitanteId);
    const row=el('div','qmatch');
    const pick=me.picks[p.n]||[null,null];
    const locked=isFT(p);
    row.innerHTML=`<div class="side home"><span>${H.nombre}</span><img loading="lazy" src="${H.badge}" alt=""></div>
      <div><div class="qbox">
        <input type="number" min="0" max="99" inputmode="numeric" data-n="${p.n}" data-s="0" value="${pick[0]??''}" ${locked?'disabled':''}>
        <span class="sep">–</span>
        <input type="number" min="0" max="99" inputmode="numeric" data-n="${p.n}" data-s="1" value="${pick[1]??''}" ${locked?'disabled':''}>
      </div><div class="qres" data-res="${p.n}"></div></div>
      <div class="side away"><img loading="lazy" src="${A.badge}" alt=""><span>${A.nombre}</span></div>`;
    list.appendChild(row);
    const res=row.querySelector('[data-res]');
    if(locked){
      let chip='';
      if(pick[0]!=null&&pick[1]!=null){
        if(pick[0]===p.golLocal&&pick[1]===p.golVisitante)chip='<span class="chip e">Exacto +3</span>';
        else if(Math.sign(pick[0]-pick[1])===Math.sign(p.golLocal-p.golVisitante))chip='<span class="chip a">Acierto +1</span>';
        else chip='<span class="chip f">Falló</span>';
      }
      res.innerHTML=`Final: ${p.golLocal}-${p.golVisitante} ${chip}`;
    } else res.textContent=dt(p).toLocaleDateString('es-MX',{day:'2-digit',month:'2-digit'});
  });
  c1.appendChild(list);
  const sc=qScore(me.picks);
  const sum=el('div','qsum');
  sum.innerHTML=`<div class="qpill"><b>${sc.pts}</b>puntos</div>
    <div class="qpill"><b class="gold-h">${sc.ex}</b>exactos ×3</div>
    <div class="qpill"><b>${sc.ac}</b>aciertos ×1</div>
    <div class="qpill"><b>${Object.keys(me.picks).length}</b>pronósticos</div>`;
  c1.appendChild(sum);
  const btns=el('div','btnrow');
  btns.innerHTML=`<button class="btn primary" id="qcopy">📋 Copiar mi código</button>
    <button class="btn wa" id="qwa">Compartir por WhatsApp</button>`;
  c1.appendChild(btns);
  const hint=el('div','qhint');
  hint.textContent='Captura tus marcadores antes de que arranque cada partido (se bloquean al terminar). Comparte tu código en el grupo de WhatsApp; cada quien importa los códigos de los demás y la tabla se califica sola: 3 pts marcador exacto, 1 pt por atinar ganador o empate.';
  c1.appendChild(hint);
  w.appendChild(c1);

  /* --- Grupo --- */
  const c2=el('div','qcard');
  c2.innerHTML=`<div class="qhead"><div class="h">👥 Tabla del grupo</div></div>`;
  const grp=qLoadGrp();
  const myKey=(me.name||'yo').trim().toLowerCase();
  const players=[];
  if(Object.keys(me.picks).length||me.name)players.push({key:myKey,name:(me.name||'Yo')+' (tú)',...qScore(me.picks),mine:true});
  Object.keys(grp).forEach(k=>{ if(k===myKey)return; players.push({key:k,name:grp[k].name,...qScore(grp[k].picks)}); });
  if(players.length){
    players.sort((a,b)=>b.pts-a.pts||b.ex-a.ex||a.name.localeCompare(b.name));
    const tc=el('div','card');tc.style.marginTop='6px';
    tc.innerHTML=`<table><thead><tr><th class="pos">#</th><th class="tname">Participante</th>
      <th>Exactos</th><th>Aciertos</th><th>Pts</th><th></th></tr></thead><tbody></tbody></table>`;
    const tb=tc.querySelector('tbody');
    players.forEach((pl,i)=>{
      const tr=el('tr');
      tr.innerHTML=`<td class="pos">${i===0?'🏆':i+1}</td>
        <td class="tname"><span style="font-weight:700">${pl.name.replace(/</g,'&lt;')}</span></td>
        <td>${pl.ex}</td><td>${pl.ac}</td><td class="pts">${pl.pts}</td>
        <td>${pl.mine?'':`<button class="pdel" data-del="${pl.key}" title="Quitar">✕</button>`}</td>`;
      tb.appendChild(tr);
    });
    c2.appendChild(tc);
  } else {
    const m=el('div','msg');m.style.padding='18px';m.textContent='Aún no hay participantes. Pon tu nombre, captura pronósticos e importa los códigos de tus amigos.';
    c2.appendChild(m);
  }
  const imp=el('div');imp.style.marginTop='12px';
  imp.innerHTML=`<textarea class="qimp" id="qimp" placeholder="Pega aquí el código (o varios) que te compartan en el grupo…"></textarea>`;
  const btns2=el('div','btnrow');
  btns2.innerHTML=`<button class="btn ghost" id="qimport">➕ Importar códigos</button>`;
  imp.appendChild(btns2);
  c2.appendChild(imp);
  const hint2=el('div','qhint');
  hint2.textContent='Los códigos importados se guardan en este dispositivo y se re-califican solos con cada resultado nuevo. Si un amigo actualiza sus pronósticos, vuelve a importar su código más reciente (se reemplaza por nombre).';
  c2.appendChild(hint2);
  w.appendChild(c2);

  /* --- eventos --- */
  $('#qname').addEventListener('input',e=>{const m=qLoadMe();m.name=e.target.value;qSaveMe(m);});
  w.querySelectorAll('.qbox input').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const n=inp.dataset.n,s=+inp.dataset.s;
      const m=qLoadMe();
      const v=inp.value===''?null:Math.max(0,Math.min(99,parseInt(inp.value,10)));
      if(Number.isNaN(v)){inp.value='';return;}
      const cur=m.picks[n]||[null,null]; cur[s]=v;
      if(cur[0]==null&&cur[1]==null)delete m.picks[n]; else m.picks[n]=cur;
      qSaveMe(m);
    });
  });
  $('#qcopy').onclick=async()=>{
    const m=qLoadMe();
    if(!m.name.trim()){qToast('Primero pon tu nombre 🙂');$('#qname').focus();return;}
    if(!Object.keys(m.picks).length){qToast('Captura al menos un pronóstico');return;}
    const code=qEncode(m);
    try{await navigator.clipboard.writeText(code);qToast('Código copiado — pégalo en tu grupo');}
    catch(e){prompt('Copia tu código:',code);}
  };
  $('#qwa').onclick=()=>{
    const m=qLoadMe();
    if(!m.name.trim()){qToast('Primero pon tu nombre 🙂');$('#qname').focus();return;}
    if(!Object.keys(m.picks).length){qToast('Captura al menos un pronóstico');return;}
    const code=qEncode(m);
    const txt=`🎯 Quiniela Liga MX — pronósticos de ${m.name.trim()}:\n\n${code}\n\nImporta este código en la app (pestaña Quiniela):\n${location.href.split('#')[0]}`;
    window.open('https://wa.me/?text='+encodeURIComponent(txt),'_blank');
  };
  $('#qimport').onclick=()=>{
    const txt=$('#qimp').value;
    const codes=txt.match(/QLMX1\.[A-Za-z0-9+/=]+/g)||[];
    if(!codes.length){qToast('No encontré ningún código válido');return;}
    const grp=qLoadGrp();let n=0;
    codes.forEach(c=>{const d=qDecode(c);if(d){grp[d.name.trim().toLowerCase()]=d;n++;}});
    qSaveGrp(grp);
    qToast(n?`Importado${n>1?'s':''}: ${n} participante${n>1?'s':''}`:'Códigos inválidos');
    renderQuiniela(true);
  };
  w.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{
    const grp=qLoadGrp();delete grp[b.dataset.del];qSaveGrp(grp);renderQuiniela(true);
  });
}

document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('nav button').forEach(x=>x.classList.remove('active'));b.classList.add('active');
  ['tabla','quiniela','resultados','proximos','calendario','liguilla','stats'].forEach(id=>$('#'+id).hidden=(id!==b.dataset.tab));});
$('#btnRefresh').onclick=liveUpdate;

if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));
let deferred=null;
window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();deferred=e;$('#btnInstall').classList.add('show');});
$('#btnInstall').onclick=async()=>{if(!deferred)return;deferred.prompt();await deferred.userChoice;deferred=null;$('#btnInstall').classList.remove('show');};

boot();
setInterval(liveUpdate,60000);
document.addEventListener('visibilitychange',()=>{if(!document.hidden)liveUpdate();});
</script>
</body>
</html>
